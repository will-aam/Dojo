<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro de Aluno</title>
    <link rel="stylesheet" href="styles/cadastro.css" />
    <!-- Adicionando favicon para evitar erro 404 -->
    <link rel="icon" href="imagens/favicon.ico" type="image/x-icon" />
  </head>
  <body>
    <header class="header">
      <a href="index.html" class="header-link">Voltar ao Login</a>
    </header>
    <div class="login-container">
      <h2 class="title">Cadastro de Aluno</h2>
      <div id="error-message" class="error-message">
        Por favor, preencha todos os campos obrigatórios
      </div>
      <div class="form-container">
        <div class="form-group">
          <label for="nome" class="label">Nome Completo *</label>
          <input
            type="text"
            id="nome"
            placeholder="Digite seu nome completo"
            class="input"
            required
          />
        </div>
        <div class="form-group">
          <label for="email" class="label">E-mail *</label>
          <input
            type="email"
            id="email"
            placeholder="Digite seu e-mail"
            class="input"
            required
          />
        </div>
        <div class="form-group">
          <label for="cpf" class="label">CPF *</label>
          <input type="text" id="cpf" class="input" maxlength="14" required />
        </div>
        <div class="form-group">
          <label for="telefone" class="label">Telefone *</label>
          <input
            type="tel"
            id="telefone"
            class="input"
            maxlength="15"
            required
          />
        </div>
        <div class="form-group">
          <label for="aniversario" class="label">Data de Nascimento</label>
          <input type="date" id="aniversario" class="input" />
        </div>
        <div class="form-group address-group">
          <label class="label">Endereço *</label>
          <input
            type="text"
            id="cep"
            placeholder="XXXXX-XXX"
            class="input"
            maxlength="9"
            required
          />
          <input
            type="text"
            id="endereco"
            placeholder="Rua, número"
            class="input"
            required
          />
          <input
            type="text"
            id="complemento"
            placeholder="Complemento"
            class="input"
          />
          <input
            type="text"
            id="bairro"
            placeholder="Bairro"
            class="input"
            required
          />
        </div>
        <div class="form-group">
          <label for="senha" class="label">Senha *</label>
          <input
            type="password"
            id="senha"
            placeholder="Crie uma senha"
            class="input"
            required
          />
        </div>
        <div class="form-group">
          <label for="modalidade" class="label">Modalidade *</label>
          <select id="modalidade" class="input" required>
            <option value="" disabled selected>Selecione uma opção</option>
            <option value="jiu-jitsu">Jiu-Jitsu</option>
            <option value="muay-thai">Muay Thai</option>
            <option value="ambos">Misto</option>
          </select>
        </div>

        <button onclick="cadastrarAluno()" class="button">Cadastrar</button>
      </div>
    </div>
    <!-- Corrigindo o caminho do script -->
    <script src="javascript/cadastro.js"></script>
  </body>
</html>
