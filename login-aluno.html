<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login do Aluno</title>
    <link
      href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      integrity="sha512-Avb2QiuDEEvB4bZJYdft2mNjVShBftLdPG8FJ0V7irTLQ8Uo0qcPxh4Plq7G5tGM0rU+8Jn4g+Wt3T8aG6G+7g=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="manifest" href="imagens/site.webmanifest" />
    <link rel="icon" href="imagens/favicon.ico" type="image/x-icon" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="imagens/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="imagens/favicon-16x16.png"
    />
    <link rel="apple-touch-icon" href="imagens/apple-touch-icon.png" />
    <link rel="stylesheet" href="styles/index.css" />
  </head>
  <body>
    <div class="login-container">
      <h1 class="text-2xl font-bold text-center text-gray-800 mb-6">
        Login do Aluno
      </h1>
      <div
        id="error-message"
        role="alert"
        class="error-message hidden text-center mb-4"
      >
        Usuário ou senha incorretos
      </div>
      <form id="loginForm">
        <div>
          <div class="mb-4">
            <label
              for="username"
              class="block text-sm font-medium text-gray-700"
              >Usuário:</label
            >
            <input
              type="text"
              id="username"
              name="username"
              placeholder="Digite seu usuário"
              class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
              required
              autocomplete="username"
              aria-invalid="false"
              aria-describedby="error-message"
            />
          </div>
          <div class="mb-6">
            <label
              for="password"
              class="block text-sm font-medium text-gray-700"
              >Senha:</label
            >
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Digite sua senha"
              class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
              required
              autocomplete="current-password"
              aria-invalid="false"
              aria-describedby="error-message"
            />
          </div>
          <button type="submit" class="enter">Entrar</button>
        </div>
      </form>
      <div id="Cadastro" class="text-center mt-4">
        <a
          href="cadastro-aluno.html"
          class="text-blue-600 font-semibold hover:underline"
        >
          Cadastro
        </a>
      </div>
      <footer class="footer mt-8">
        <div id="footer_items">
          <span id="copyright">© 2025 DOJO THIAGO CHEIROSO</span>
          <div class="social-media-buttons">
            <a
              href="https://api.whatsapp.com/send?phone=5579999227222&fbclid=PAQ0xDSwJ_FxFleHRuA2FlbQIxMQABpzBI6Uj0P6qa_xKmwG3nhfJC5SoT0p8AWQ6i46v-yvQ1cqQPupGpKiVoO8yF_aem_AO6vq3Fc3s47zBnQ5JRqKg"
              aria-label="Abrir WhatsApp"
            >
              <img
                src="imagens/whatsapp-ico.png"
                alt="Ícone do WhatsApp"
                class="whatsapp-icon"
              />
            </a>
          </div>
        </div>
      </footer>
    </div>

    <script src="javascript/index.js"></script>
  </body>
</html>
