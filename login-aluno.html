<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login do Aluno</title>
    <link
      href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      integrity="sha512-..."
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <link rel="stylesheet" href="styles/index.css" />
  </head>
  <body>
    <div class="login-container">
      <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">
        Login do Aluno
      </h2>
      <div id="error-message" class="error-message hidden text-center mb-4">
        Usuário ou senha incorretos
      </div>

      <div>
        <div class="mb-4">
          <label for="username" class="block text-sm font-medium text-gray-700"
            >Usuário:</label
          >
          <input
            type="text"
            id="username"
            placeholder="Digite seu usuário"
            class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
          />
        </div>
        <div class="mb-6">
          <label for="password" class="block text-sm font-medium text-gray-700"
            >Senha:</label
          >
          <input
            type="password"
            id="password"
            placeholder="Digite sua senha"
            class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
          />
        </div>
        <button onclick="login()" class="enter">Entrar</button>
      </div>
      <br />
      <div id="Cadastro" class="text-center mb-4">
        <a
          href="cadastro-aluno.html"
          class="text-blue-600 font-semibold hover:underline"
        >
          Cadastro
        </a>
      </div>
      <a href="aluno.html">Teste</a>
      <footer class="footer">
        <div id="footer_items">
          <span id="copyright"> © 2025 DOJO THIAGO CHEIROSO</span>
          <br />

          <div class="social-media-buttons">
            <a
              href="https://api.whatsapp.com/send?phone=5579999227222&fbclid=PAQ0xDSwJ_FxFleHRuA2FlbQIxMQABpzBI6Uj0P6qa_xKmwG3nhfJC5SoT0p8AWQ6i46v-yvQ1cqQPupGpKiVoO8yF_aem_AO6vq3Fc3s47zBnQ5JRqKg"
              aria-label="Abrir WhatsApp"
            >
              <i class="fa-brands fa-whatsapp" aria-hidden="true"></i>
            </a>
          </div>
        </div>
      </footer>
    </div>

    <script src="javascript/index.js"></script>
  </body>
</html>
